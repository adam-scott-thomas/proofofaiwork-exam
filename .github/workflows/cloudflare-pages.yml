name: Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    env:
      # These VITE_* vars are inlined into the build, so they're public.
      # Real secrets (Anthropic keys, Plaid keys, etc.) live in the BACKEND.
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_WS_BASE_URL: ${{ vars.VITE_WS_BASE_URL }}
      VITE_AUTH_ORIGIN: ${{ vars.VITE_AUTH_ORIGIN }}
      VITE_FEATURE_VERIFIED_ENABLED: ${{ vars.VITE_FEATURE_VERIFIED_ENABLED || 'false' }}
      VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: proofofaiwork-exam
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # Branch name is auto-detected; PRs publish a preview, main publishes production.
